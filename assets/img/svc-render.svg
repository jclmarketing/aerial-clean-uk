<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs><linearGradient id="sky-r" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb0d8"/><stop offset="100%" stop-color="#1d3a5f"/></linearGradient></defs>
  <rect width="600" height="450" fill="url(#sky-r)"/>
  <!-- render wall (cream) -->
  <rect x="0" y="50" width="600" height="400" fill="#e8dcc8"/>
  <!-- algae stains -->
  <g opacity="0.45" fill="#5a7a3a">
    <ellipse cx="80" cy="200" rx="60" ry="180"/>
    <ellipse cx="220" cy="240" rx="40" ry="160"/>
    <ellipse cx="500" cy="220" rx="50" ry="170"/>
  </g>
  <!-- clean section -->
  <rect x="280" y="50" width="160" height="400" fill="#f5ebd6"/>
  <!-- shadow line -->
  <rect x="278" y="50" width="2" height="400" fill="black" opacity="0.1"/>
  <rect x="440" y="50" width="2" height="400" fill="black" opacity="0.1"/>
  <!-- drone -->
  <g transform="translate(360, 220)">
    <rect x="-30" y="-3" width="60" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-30" width="6" height="60" fill="#0a1628" rx="2"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#0a1628"/>
    <ellipse cx="0" cy="-2" rx="11" ry="6" fill="#5fe6ff"/>
    <g opacity="0.5"><ellipse cx="-30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="-30" cy="30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="30" rx="18" ry="2.5" fill="white"/></g>
    <path d="M -12 12 L -40 90 L 40 90 L 12 12 Z" fill="white" opacity="0.4"/>
  </g>
</svg>
