<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-f" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb0d8"/><stop offset="100%" stop-color="#1d3a5f"/></linearGradient>
    <pattern id="brick" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="#b87a5a"/>
      <rect x="0" y="0" width="40" height="1" fill="#8a5a3e"/>
      <rect x="20" y="0" width="1" height="20" fill="#8a5a3e"/>
      <rect x="0" y="10" width="1" height="10" fill="#8a5a3e"/>
    </pattern>
  </defs>
  <rect width="600" height="450" fill="url(#sky-f)"/>
  <!-- brick facade -->
  <rect x="0" y="60" width="600" height="390" fill="url(#brick)"/>
  <!-- darker grime gradient -->
  <rect x="0" y="60" width="600" height="200" fill="black" opacity="0.25"/>
  <!-- clean section -->
  <rect x="240" y="60" width="160" height="390" fill="#d49a76"/>
  <rect x="240" y="60" width="160" height="390" fill="url(#brick)" opacity="0.6"/>
  <!-- drone -->
  <g transform="translate(320, 200)">
    <rect x="-30" y="-3" width="60" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-30" width="6" height="60" fill="#0a1628" rx="2"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#0a1628"/>
    <ellipse cx="0" cy="-2" rx="11" ry="6" fill="#5fe6ff"/>
    <g opacity="0.5"><ellipse cx="-30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="-30" cy="30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="30" rx="18" ry="2.5" fill="white"/></g>
    <path d="M -10 12 L -30 80 L 30 80 L 10 12 Z" fill="white" opacity="0.4"/>
  </g>
</svg>
