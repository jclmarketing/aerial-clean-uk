<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0078d4"/><stop offset="100%" stop-color="#0a1628"/></linearGradient>
    <radialGradient id="glow-a" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#5fe6ff" stop-opacity="0.4"/><stop offset="100%" stop-color="#5fe6ff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg-a)"/>
  <ellipse cx="300" cy="240" rx="280" ry="180" fill="url(#glow-a)"/>
  <!-- grid -->
  <g stroke="white" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- big drone centerpiece -->
  <g transform="translate(300, 300)">
    <rect x="-90" y="-6" width="180" height="12" fill="#0a1628" rx="4"/>
    <rect x="-6" y="-90" width="12" height="180" fill="#0a1628" rx="4"/>
    <ellipse cx="0" cy="0" rx="60" ry="38" fill="#0a1628"/>
    <ellipse cx="0" cy="-4" rx="40" ry="22" fill="#5fe6ff"/>
    <text x="0" y="2" font-family="sans-serif" font-size="14" font-weight="700" fill="#0a1628" text-anchor="middle" letter-spacing="2">ACUK</text>
    <g opacity="0.6">
      <ellipse cx="-90" cy="-90" rx="55" ry="6" fill="white"/>
      <ellipse cx="90" cy="-90" rx="55" ry="6" fill="white"/>
      <ellipse cx="-90" cy="90" rx="55" ry="6" fill="white"/>
      <ellipse cx="90" cy="90" rx="55" ry="6" fill="white"/>
    </g>
    <circle cx="-90" cy="-90" r="10" fill="#0a1628"/>
    <circle cx="90" cy="-90" r="10" fill="#0a1628"/>
    <circle cx="-90" cy="90" r="10" fill="#0a1628"/>
    <circle cx="90" cy="90" r="10" fill="#0a1628"/>
    <circle cx="-90" cy="-90" r="4" fill="#1ed05b"/>
    <circle cx="90" cy="-90" r="4" fill="#ff3b30"/>
    <circle cx="-90" cy="90" r="4" fill="#1ed05b"/>
    <circle cx="90" cy="90" r="4" fill="#ff3b30"/>
  </g>
</svg>
