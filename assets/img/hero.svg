<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 840" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="50%" stop-color="#2563a8"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fa8d8"/>
      <stop offset="100%" stop-color="#1d3a5f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8d8f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5fb0d8" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5fe6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5fe6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="840" fill="url(#sky)"/>
  <ellipse cx="400" cy="240" rx="360" ry="200" fill="url(#light)"/>

  <!-- distant skyline -->
  <g opacity="0.35">
    <rect x="40" y="540" width="60" height="180" fill="#0a1628"/>
    <rect x="110" y="500" width="80" height="220" fill="#0a1628"/>
    <rect x="200" y="560" width="50" height="160" fill="#0a1628"/>
    <rect x="610" y="520" width="70" height="200" fill="#0a1628"/>
    <rect x="690" y="480" width="80" height="240" fill="#0a1628"/>
  </g>

  <!-- main building (glass facade) -->
  <g>
    <rect x="240" y="180" width="320" height="660" fill="url(#bldg)"/>
    <!-- windows grid -->
    <g fill="url(#glass)" opacity="0.85">
      <!-- 6 cols x 14 rows -->
      <g>
        <rect x="260" y="200" width="40" height="38"/><rect x="306" y="200" width="40" height="38"/>
        <rect x="352" y="200" width="40" height="38"/><rect x="398" y="200" width="40" height="38"/>
        <rect x="444" y="200" width="40" height="38"/><rect x="490" y="200" width="40" height="38"/>
      </g>
    </g>
    <!-- repeat windows pattern -->
    <g fill="url(#glass)" opacity="0.9">
      <g id="row">
        <rect x="260" y="0" width="40" height="38"/><rect x="306" y="0" width="40" height="38"/>
        <rect x="352" y="0" width="40" height="38"/><rect x="398" y="0" width="40" height="38"/>
        <rect x="444" y="0" width="40" height="38"/><rect x="490" y="0" width="40" height="38"/>
      </g>
      <use href="#row" y="245"/>
      <use href="#row" y="290"/>
      <use href="#row" y="335"/>
      <use href="#row" y="380"/>
      <use href="#row" y="425"/>
      <use href="#row" y="470"/>
      <use href="#row" y="515"/>
      <use href="#row" y="560"/>
      <use href="#row" y="605"/>
      <use href="#row" y="650"/>
      <use href="#row" y="695"/>
      <use href="#row" y="740"/>
      <use href="#row" y="785"/>
    </g>
    <!-- clean streak highlight -->
    <rect x="350" y="180" width="90" height="660" fill="white" opacity="0.07"/>
  </g>

  <!-- water spray cone -->
  <g opacity="0.55">
    <path d="M 555 370 L 470 420 L 470 470 L 555 410 Z" fill="white" opacity="0.4" filter="url(#glow)"/>
    <circle cx="500" cy="430" r="3" fill="white"/>
    <circle cx="490" cy="445" r="2" fill="white"/>
    <circle cx="510" cy="450" r="2.5" fill="white"/>
    <circle cx="480" cy="455" r="2" fill="white"/>
    <circle cx="520" cy="465" r="2.5" fill="white"/>
  </g>

  <!-- drone -->
  <g transform="translate(560, 360)">
    <!-- arms -->
    <rect x="-35" y="-3" width="70" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-35" width="6" height="70" fill="#0a1628" rx="2"/>
    <!-- body -->
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#0a1628"/>
    <ellipse cx="0" cy="-2" rx="14" ry="8" fill="#5fe6ff" opacity="0.9"/>
    <!-- propellers -->
    <g opacity="0.5">
      <ellipse cx="-35" cy="-35" rx="22" ry="3" fill="white"/>
      <ellipse cx="35" cy="-35" rx="22" ry="3" fill="white"/>
      <ellipse cx="-35" cy="35" rx="22" ry="3" fill="white"/>
      <ellipse cx="35" cy="35" rx="22" ry="3" fill="white"/>
    </g>
    <circle cx="-35" cy="-35" r="4" fill="#0a1628"/>
    <circle cx="35" cy="-35" r="4" fill="#0a1628"/>
    <circle cx="-35" cy="35" r="4" fill="#0a1628"/>
    <circle cx="35" cy="35" r="4" fill="#0a1628"/>
    <!-- lights -->
    <circle cx="-35" cy="-35" r="2" fill="#1ed05b"/>
    <circle cx="35" cy="-35" r="2" fill="#ff3b30"/>
    <!-- cleaning arm extending -->
    <line x1="-22" y1="0" x2="-90" y2="60" stroke="#0a1628" stroke-width="3"/>
    <circle cx="-90" cy="60" r="5" fill="#5fe6ff"/>
  </g>
</svg>
