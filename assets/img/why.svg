<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb0d8"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="solar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2b4f"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>

  <!-- roof with solar panels -->
  <g transform="translate(0, 380)">
    <polygon points="0,200 600,200 600,80 0,160" fill="#3a4f6a"/>
    <!-- solar panels -->
    <g fill="url(#solar)" stroke="#5fe6ff" stroke-width="0.5" opacity="0.95">
      <polygon points="60,170 200,150 200,100 60,118"/>
      <polygon points="220,148 360,128 360,78 220,98"/>
      <polygon points="380,126 520,106 520,56 380,76"/>
    </g>
    <!-- panel grid lines -->
    <g stroke="#5fe6ff" stroke-width="0.4" opacity="0.6" fill="none">
      <line x1="130" y1="134" x2="130" y2="155"/>
      <line x1="60" y1="135" x2="200" y2="120"/>
      <line x1="290" y1="113" x2="290" y2="138"/>
      <line x1="220" y1="115" x2="360" y2="100"/>
      <line x1="450" y1="91" x2="450" y2="116"/>
      <line x1="380" y1="93" x2="520" y2="78"/>
    </g>
  </g>

  <!-- drone hovering above -->
  <g transform="translate(300, 220)">
    <!-- shadow on roof -->
    <ellipse cx="0" cy="200" rx="30" ry="8" fill="black" opacity="0.25"/>
    <!-- arms -->
    <rect x="-40" y="-3" width="80" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-40" width="6" height="80" fill="#0a1628" rx="2"/>
    <!-- body -->
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#0a1628"/>
    <ellipse cx="0" cy="-2" rx="16" ry="9" fill="#5fe6ff" opacity="0.95"/>
    <!-- propellers -->
    <g opacity="0.55">
      <ellipse cx="-40" cy="-40" rx="26" ry="3" fill="white"/>
      <ellipse cx="40" cy="-40" rx="26" ry="3" fill="white"/>
      <ellipse cx="-40" cy="40" rx="26" ry="3" fill="white"/>
      <ellipse cx="40" cy="40" rx="26" ry="3" fill="white"/>
    </g>
    <circle cx="-40" cy="-40" r="5" fill="#0a1628"/>
    <circle cx="40" cy="-40" r="5" fill="#0a1628"/>
    <circle cx="-40" cy="40" r="5" fill="#0a1628"/>
    <circle cx="40" cy="40" r="5" fill="#0a1628"/>
    <circle cx="-40" cy="-40" r="2" fill="#1ed05b"/>
    <circle cx="40" cy="-40" r="2" fill="#ff3b30"/>
    <!-- spray below -->
    <g opacity="0.45">
      <path d="M -10 16 L -25 80 L 25 80 L 10 16 Z" fill="white" opacity="0.4"/>
      <circle cx="-10" cy="60" r="2" fill="white"/>
      <circle cx="10" cy="68" r="2" fill="white"/>
      <circle cx="0" cy="50" r="2" fill="white"/>
    </g>
  </g>

  <!-- sun -->
  <circle cx="500" cy="120" r="50" fill="#ffd76b" opacity="0.5"/>
  <circle cx="500" cy="120" r="35" fill="#ffd76b" opacity="0.7"/>
</svg>
