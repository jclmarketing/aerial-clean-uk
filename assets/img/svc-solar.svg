<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb0d8"/><stop offset="100%" stop-color="#a8d8f0"/></linearGradient>
    <linearGradient id="pan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d2b4f"/><stop offset="100%" stop-color="#1a4a7a"/></linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#sky-s)"/>
  <circle cx="500" cy="80" r="40" fill="#ffd76b" opacity="0.7"/>
  <!-- roof -->
  <polygon points="0,450 600,450 600,260 0,320" fill="#3a4f6a"/>
  <!-- solar panels -->
  <g fill="url(#pan)" stroke="#5fe6ff" stroke-width="0.6" opacity="0.95">
    <polygon points="40,310 200,288 200,210 40,228"/>
    <polygon points="220,286 380,264 380,186 220,204"/>
    <polygon points="400,262 560,240 560,162 400,180"/>
  </g>
  <!-- drone -->
  <g transform="translate(300, 130)">
    <rect x="-30" y="-3" width="60" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-30" width="6" height="60" fill="#0a1628" rx="2"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#0a1628"/>
    <ellipse cx="0" cy="-2" rx="11" ry="6" fill="#5fe6ff"/>
    <g opacity="0.5"><ellipse cx="-30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="-30" rx="18" ry="2.5" fill="white"/><ellipse cx="-30" cy="30" rx="18" ry="2.5" fill="white"/><ellipse cx="30" cy="30" rx="18" ry="2.5" fill="white"/></g>
    <path d="M -8 14 L -20 70 L 20 70 L 8 14 Z" fill="white" opacity="0.4"/>
  </g>
</svg>
