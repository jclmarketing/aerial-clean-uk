<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" preserveAspectRatio="xMidYMid slice">
  <defs><linearGradient id="sky-g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fa8d8"/><stop offset="100%" stop-color="#1d3a5f"/></linearGradient></defs>
  <rect width="600" height="450" fill="url(#sky-g)"/>
  <!-- house silhouette -->
  <polygon points="80,200 300,80 520,200 520,420 80,420" fill="#2a4a70"/>
  <polygon points="80,200 300,80 520,200" fill="#1d3a5f"/>
  <!-- gutter line -->
  <rect x="60" y="195" width="480" height="14" fill="#5fe6ff" opacity="0.7"/>
  <rect x="60" y="195" width="480" height="6" fill="#1ed05b"/>
  <!-- windows -->
  <rect x="180" y="260" width="60" height="80" fill="#a8d8f0"/>
  <rect x="360" y="260" width="60" height="80" fill="#a8d8f0"/>
  <rect x="270" y="320" width="60" height="100" fill="#0a1628"/>
  <!-- drone with extension arm -->
  <g transform="translate(150, 150)">
    <rect x="-25" y="-3" width="50" height="6" fill="#0a1628" rx="2"/>
    <rect x="-3" y="-25" width="6" height="50" fill="#0a1628" rx="2"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="#0a1628"/>
    <ellipse cx="0" cy="-1" rx="9" ry="5" fill="#5fe6ff"/>
    <g opacity="0.5"><ellipse cx="-25" cy="-25" rx="16" ry="2" fill="white"/><ellipse cx="25" cy="-25" rx="16" ry="2" fill="white"/><ellipse cx="-25" cy="25" rx="16" ry="2" fill="white"/><ellipse cx="25" cy="25" rx="16" ry="2" fill="white"/></g>
    <line x1="0" y1="10" x2="-10" y2="50" stroke="#0a1628" stroke-width="3"/>
    <circle cx="-10" cy="50" r="6" fill="#1ed05b"/>
  </g>
</svg>
